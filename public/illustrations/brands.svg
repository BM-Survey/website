<svg width="360" height="300" viewBox="0 0 360 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bTower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D8F2DF"/>
    </linearGradient>
    <linearGradient id="bTowerSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CDEBD4"/>
      <stop offset="1" stop-color="#9ED8AC"/>
    </linearGradient>
    <linearGradient id="bBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EDFBF0"/>
      <stop offset="1" stop-color="#BEE7C8"/>
    </linearGradient>
    <linearGradient id="bWinLit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE9A3"/>
      <stop offset="1" stop-color="#FFC94D"/>
    </linearGradient>
    <filter id="bSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0B3D1C" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sun + clouds -->
  <circle cx="70" cy="66" r="20" fill="#FFFFFF" opacity="0.35"/>
  <g fill="#FFFFFF" opacity="0.3">
    <path d="M256 52a12 12 0 0 1 23-4 10 10 0 0 1 15 9 8 8 0 0 1-1 15h-46a10 10 0 0 1 9-20z"/>
    <path d="M96 108a9 9 0 0 1 17-3 8 8 0 0 1 11 7 6 6 0 0 1-1 11H89a8 8 0 0 1 7-15z"/>
  </g>

  <!-- Left building (behind) -->
  <g filter="url(#bSoft)" opacity="0.92">
    <rect x="58" y="146" width="76" height="134" rx="10" fill="url(#bBack)"/>
    <rect x="58" y="146" width="76" height="10" rx="5" fill="#FFFFFF" opacity="0.6"/>
    <g fill="#6FBF80">
      <rect x="72" y="168" width="15" height="15" rx="3"/>
      <rect x="99" y="168" width="15" height="15" rx="3"/>
      <rect x="72" y="196" width="15" height="15" rx="3"/>
      <rect x="72" y="224" width="15" height="15" rx="3"/>
      <rect x="99" y="224" width="15" height="15" rx="3"/>
    </g>
    <rect x="99" y="196" width="15" height="15" rx="3" fill="url(#bWinLit)"/>
  </g>

  <!-- Right building (behind) -->
  <g filter="url(#bSoft)" opacity="0.95">
    <rect x="228" y="118" width="78" height="162" rx="10" fill="url(#bBack)"/>
    <rect x="240" y="104" width="16" height="14" rx="3" fill="#EDFBF0"/>
    <g fill="#6FBF80">
      <rect x="242" y="136" width="15" height="15" rx="3"/>
      <rect x="270" y="136" width="15" height="15" rx="3"/>
      <rect x="270" y="164" width="15" height="15" rx="3"/>
      <rect x="242" y="192" width="15" height="15" rx="3"/>
      <rect x="270" y="192" width="15" height="15" rx="3"/>
      <rect x="242" y="220" width="15" height="15" rx="3"/>
    </g>
    <rect x="242" y="164" width="15" height="15" rx="3" fill="url(#bWinLit)"/>
    <rect x="270" y="220" width="15" height="15" rx="3" fill="url(#bWinLit)"/>
  </g>

  <!-- Center tower (front) -->
  <g filter="url(#bSoft)">
    <!-- antenna -->
    <rect x="177" y="52" width="6" height="30" rx="3" fill="#CDEBD4"/>
    <circle cx="180" cy="48" r="6" fill="url(#bWinLit)"/>
    <!-- roof block -->
    <rect x="162" y="78" width="36" height="18" rx="5" fill="#FFFFFF"/>
    <!-- body -->
    <rect x="136" y="92" width="88" height="188" rx="11" fill="url(#bTower)"/>
    <rect x="206" y="92" width="18" height="188" rx="9" fill="url(#bTowerSide)" opacity="0.7"/>
    <rect x="136" y="92" width="88" height="12" rx="6" fill="#FFFFFF"/>
    <g fill="#3E9C54">
      <rect x="150" y="116" width="17" height="17" rx="3.5"/>
      <rect x="177" y="116" width="17" height="17" rx="3.5"/>
      <rect x="150" y="146" width="17" height="17" rx="3.5"/>
      <rect x="150" y="176" width="17" height="17" rx="3.5"/>
      <rect x="177" y="176" width="17" height="17" rx="3.5"/>
      <rect x="177" y="206" width="17" height="17" rx="3.5"/>
    </g>
    <rect x="177" y="146" width="17" height="17" rx="3.5" fill="url(#bWinLit)"/>
    <rect x="150" y="206" width="17" height="17" rx="3.5" fill="url(#bWinLit)"/>
    <!-- entrance -->
    <path d="M164 280v-32a16 16 0 0 1 32 0v32z" fill="#2F8A45"/>
    <rect x="178" y="252" width="4" height="28" rx="2" fill="#DFF3E4"/>
  </g>

  <!-- Verified-partner badge -->
  <g filter="url(#bSoft)">
    <circle cx="286" cy="84" r="24" fill="#FFFFFF"/>
    <circle cx="286" cy="84" r="18" fill="url(#bWinLit)"/>
    <path d="M277 84l6 6 12-13" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
