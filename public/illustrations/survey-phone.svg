<svg width="480" height="600" viewBox="0 0 480 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spPhone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2F5FF"/>
    </linearGradient>
    <linearGradient id="spHeader" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3355FF"/>
      <stop offset="1" stop-color="#2E5BFF"/>
    </linearGradient>
    <linearGradient id="spCoin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE9A3"/>
      <stop offset="1" stop-color="#F5A623"/>
    </linearGradient>
    <linearGradient id="spCheck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ED07A"/>
      <stop offset="1" stop-color="#22C35E"/>
    </linearGradient>
    <filter id="spShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#2E5BFF" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- Phone body -->
  <g filter="url(#spShadow)">
    <rect x="130" y="70" width="220" height="440" rx="34" fill="url(#spPhone)" stroke="#E3E9FF" stroke-width="2"/>
  </g>

  <!-- Screen header -->
  <path d="M148 104a20 20 0 0 1 20-20h144a20 20 0 0 1 20 20v54H148z" fill="url(#spHeader)"/>
  <rect x="168" y="106" width="90" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.9"/>
  <rect x="168" y="128" width="60" height="9" rx="4.5" fill="#FFFFFF" fill-opacity="0.55"/>

  <!-- Survey question card -->
  <rect x="148" y="176" width="184" height="14" rx="7" fill="#DDE4FF"/>
  <rect x="148" y="198" width="120" height="14" rx="7" fill="#EAEEFF"/>

  <!-- Options -->
  <g>
    <rect x="148" y="234" width="184" height="40" rx="12" fill="#EEF2FF"/>
    <circle cx="170" cy="254" r="10" fill="url(#spCheck)"/>
    <path d="M165 254l4 4 7-8" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="190" y="248" width="110" height="12" rx="6" fill="#C7D2F5"/>
  </g>
  <g>
    <rect x="148" y="284" width="184" height="40" rx="12" fill="#F4F7FF"/>
    <circle cx="170" cy="304" r="10" fill="#DDE4FF"/>
    <rect x="190" y="298" width="90" height="12" rx="6" fill="#D8E0F7"/>
  </g>
  <g>
    <rect x="148" y="334" width="184" height="40" rx="12" fill="#F4F7FF"/>
    <circle cx="170" cy="354" r="10" fill="#DDE4FF"/>
    <rect x="190" y="348" width="104" height="12" rx="6" fill="#D8E0F7"/>
  </g>

  <!-- Submit / reward button -->
  <rect x="148" y="398" width="184" height="46" rx="14" fill="url(#spCheck)"/>
  <rect x="206" y="416" width="68" height="12" rx="6" fill="#FFFFFF"/>

  <!-- Floating coin (top right) -->
  <g filter="url(#spShadow)">
    <circle cx="360" cy="150" r="46" fill="url(#spCoin)"/>
    <circle cx="360" cy="150" r="34" fill="none" stroke="#E39A1F" stroke-width="2.5" stroke-dasharray="3 6"/>
    <text x="360" y="170" font-family="Arial, sans-serif" font-size="44" font-weight="900" fill="#C6791A" text-anchor="middle">$</text>
  </g>

  <!-- Floating coin (bottom left) -->
  <g filter="url(#spShadow)">
    <circle cx="118" cy="420" r="34" fill="url(#spCoin)"/>
    <text x="118" y="435" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#C6791A" text-anchor="middle">$</text>
  </g>

  <!-- Small chat/opinion bubble -->
  <g filter="url(#spShadow)">
    <path d="M96 210h84a16 16 0 0 1 16 16v34a16 16 0 0 1-16 16h-48l-20 20v-20h-16a16 16 0 0 1-16-16v-34a16 16 0 0 1 16-16z" fill="#FFFFFF"/>
    <rect x="112" y="232" width="52" height="9" rx="4.5" fill="#C7D2F5"/>
    <rect x="112" y="248" width="36" height="9" rx="4.5" fill="#E1E7FA"/>
  </g>
</svg>
