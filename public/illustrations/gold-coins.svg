<svg width="400" height="320" viewBox="0 0 400 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glossy coin face (top of a coin, seen at an angle) -->
    <radialGradient id="gcFace" cx="38%" cy="30%" r="80%">
      <stop offset="0" stop-color="#FFF6D6"/>
      <stop offset="42%" stop-color="#FFD968"/>
      <stop offset="100%" stop-color="#F2A31D"/>
    </radialGradient>
    <!-- Coin rim / thickness -->
    <linearGradient id="gcRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6B12A"/>
      <stop offset="55%" stop-color="#E08F16"/>
      <stop offset="100%" stop-color="#B96F0C"/>
    </linearGradient>
    <!-- Standing front coin -->
    <linearGradient id="gcStand" x1="0.15" y1="0.05" x2="0.85" y2="0.95">
      <stop offset="0" stop-color="#FFEFB0"/>
      <stop offset="45%" stop-color="#FFCB4F"/>
      <stop offset="100%" stop-color="#EE9C15"/>
    </linearGradient>
    <linearGradient id="gcStandRim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C67D10"/>
      <stop offset="0.5" stop-color="#E79A16"/>
      <stop offset="1" stop-color="#B96F0C"/>
    </linearGradient>
    <radialGradient id="gcInner" cx="40%" cy="34%" r="75%">
      <stop offset="0" stop-color="#FFE999"/>
      <stop offset="100%" stop-color="#F4B02C"/>
    </radialGradient>
    <filter id="gcSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#7A4A00" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#gcSoft)">
    <!-- ===== Left stack (short) ===== -->
    <g>
      <ellipse cx="112" cy="252" rx="60" ry="21" fill="url(#gcRim)"/>
      <path d="M52 234v18a60 21 0 0 0 120 0v-18z" fill="url(#gcRim)"/>
      <ellipse cx="112" cy="234" rx="60" ry="21" fill="url(#gcFace)"/>
      <ellipse cx="112" cy="234" rx="47" ry="15" fill="none" stroke="#E5981A" stroke-width="2" stroke-opacity="0.5"/>
      <ellipse cx="95" cy="228" rx="24" ry="7" fill="#FFF6D6" fill-opacity="0.55"/>
    </g>

    <!-- ===== Right tall stack ===== -->
    <g>
      <ellipse cx="300" cy="268" rx="66" ry="23" fill="url(#gcRim)"/>
      <path d="M234 220v48a66 23 0 0 0 132 0v-48z" fill="url(#gcRim)"/>
      <!-- ridge lines -->
      <path d="M234 236a66 23 0 0 0 132 0" fill="none" stroke="#B96F0C" stroke-width="1.5" stroke-opacity="0.5"/>
      <path d="M234 252a66 23 0 0 0 132 0" fill="none" stroke="#B96F0C" stroke-width="1.5" stroke-opacity="0.5"/>
      <ellipse cx="300" cy="220" rx="66" ry="23" fill="url(#gcFace)"/>
      <ellipse cx="300" cy="220" rx="51" ry="16" fill="none" stroke="#E5981A" stroke-width="2" stroke-opacity="0.5"/>
      <ellipse cx="282" cy="213" rx="26" ry="8" fill="#FFF6D6" fill-opacity="0.55"/>
    </g>

    <!-- ===== Front standing coin with $ ===== -->
    <g>
      <!-- thickness -->
      <ellipse cx="208" cy="158" rx="78" ry="80" fill="url(#gcStandRim)"/>
      <ellipse cx="200" cy="156" rx="78" ry="80" fill="url(#gcStand)"/>
      <ellipse cx="200" cy="156" rx="60" ry="62" fill="url(#gcInner)"/>
      <ellipse cx="200" cy="156" rx="60" ry="62" fill="none" stroke="#E0940F" stroke-width="2.5" stroke-dasharray="2 7" stroke-opacity="0.7"/>
      <!-- glossy highlight -->
      <path d="M146 110a72 74 0 0 1 62-30 62 64 0 0 0-58 50 6 6 0 0 1-4-20z" fill="#FFFFFF" fill-opacity="0.4"/>
      <text x="200" y="190" font-family="Arial, sans-serif" font-size="82" font-weight="900" fill="#C57C10" text-anchor="middle">$</text>
      <text x="197" y="187" font-family="Arial, sans-serif" font-size="82" font-weight="900" fill="#FFE9A0" text-anchor="middle">$</text>
    </g>

    <!-- ===== Loose flying coins ===== -->
    <g>
      <ellipse cx="70" cy="150" rx="28" ry="11" fill="url(#gcRim)" transform="rotate(-24 70 150)"/>
      <ellipse cx="70" cy="145" rx="28" ry="11" fill="url(#gcFace)" transform="rotate(-24 70 150)"/>
    </g>
    <g>
      <ellipse cx="344" cy="176" rx="24" ry="9.5" fill="url(#gcRim)" transform="rotate(20 344 176)"/>
      <ellipse cx="344" cy="171" rx="24" ry="9.5" fill="url(#gcFace)" transform="rotate(20 344 176)"/>
    </g>
  </g>

  <!-- Sparkles -->
  <g fill="#FFF6D6">
    <path d="M120 70l4 10 10 4-10 4-4 10-4-10-10-4 10-4z" opacity="0.9"/>
    <path d="M312 96l3 7.6 7.6 3-7.6 3-3 7.6-3-7.6-7.6-3 7.6-3z" opacity="0.75"/>
    <circle cx="60" cy="110" r="4" opacity="0.6"/>
    <circle cx="352" cy="132" r="3.5" opacity="0.55"/>
  </g>
</svg>
